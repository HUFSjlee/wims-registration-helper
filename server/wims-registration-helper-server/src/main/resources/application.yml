spring:
  application:
    name: wims-registration-helper-server

  datasource:
    url: jdbc:h2:mem:wimsdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: wims-registration-helper-secret-key-at-least-32bytes
  access-token-expiration-seconds: 3600

logging:
  level:
    org.springframework.security: DEBUG
