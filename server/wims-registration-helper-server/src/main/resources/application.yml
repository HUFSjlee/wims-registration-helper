spring:
  application:
    name: wims-registration-helper-server

  profiles:
    active: local

  datasource:
    # Keep real credentials out of this file.
    # Put actual values in application-local.yml (gitignored).
    url: jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: YOUR_SUPABASE_DB_USER
    password: YOUR_SUPABASE_DB_PASSWORD

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

jwt:
  secret: CHANGE_ME_TO_A_LONG_RANDOM_SECRET_KEY
  access-token-expiration-seconds: 3600

logging:
  level:
    org.springframework.security: INFO
