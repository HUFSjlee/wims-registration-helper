spring:
  application:
    name: wims-registration-helper-server

  profiles:
    active: local

  datasource:
    driver-class-name: org.postgresql.Driver
    # url / username / password: override in application-local.yml (gitignored)
    url: jdbc:postgresql://localhost:5432/postgres?sslmode=require
    username: postgres

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

jwt:
  access-token-expiration-seconds: 3600
  # secret: set in application-local.yml (see application-local.yml.example)

logging:
  level:
    org.springframework.security: INFO
